<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Even or Odd Checker</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>Even or Odd Checker</h1>
        <p class="description">
            This JavaScript program checks whether numbers are even or odd
            using an if-else statement and the modulo operator.
        </p>
        <div class="formulabox">
            <h2>Logic Used</h2>
            <p>
                If a number divided by 2 gives remainder 0,
                the number is even. Otherwise, it is odd.
            </p>
        </div>
        <p class="note">
            Open the browser console to view the results.
        </p>
    </div>
    <script src="script.js"></script>
</body>
</html>
